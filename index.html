<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin | Rivi Silva</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f9fa; }
        .gold-bg { background: linear-gradient(135deg, #f09f0a 0%, #a67c00 100%); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f09f0a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CREDENCIAIS DO SEU SISTEMA ---
        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- LOGIN ---
        const LoginPortal = ({ onLogin }) => {
            const [pass, setPass] = useState("");
            return (
                <div className="min-h-screen flex items-center justify-center bg-black p-4">
                    <div className="bg-[#111] p-10 rounded-[2.5rem] border border-[#f09f0a]/20 w-full max-w-md text-center shadow-2xl">
                        <div className="mb-6 flex justify-center">
                            <div className="w-16 h-16 rounded-full bg-[#f09f0a] flex items-center justify-center">
                                <i data-lucide="lock" className="text-black"></i>
                            </div>
                        </div>
                        <h2 className="text-[#f09f0a] font-black italic uppercase text-2xl mb-8 tracking-tighter text-center leading-none">
                            Rivi Silva<br/><span className="text-[10px] tracking-[0.4em] text-white/50">Admin Portal</span>
                        </h2>
                        <input 
                            type="password" 
                            placeholder="SENHA DE ACESSO" 
                            className="w-full p-5 bg-black border border-zinc-800 rounded-2xl text-white text-center mb-6 outline-none focus:border-[#f09f0a] transition-all"
                            value={pass}
                            onChange={(e) => setPass(e.target.value)}
                        />
                        <button 
                            onClick={() => pass === "1234" ? onLogin() : alert("Senha Incorreta")}
                            className="w-full py-5 gold-bg text-black font-black uppercase text-xs tracking-widest rounded-2xl active:scale-95 transition-all"
                        > Entrar no Sistema </button>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD PRINCIPAL ---
        function Dashboard() {
            const [isAuth, setIsAuth] = useState(false);
            const [loading, setLoading] = useState(true);
            const [clientes, setClientes] = useState([]);
            const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);

            useEffect(() => {
                if (isAuth) {
                    fetchData();
                    const interval = setInterval(fetchData, 30000); 
                    return () => clearInterval(interval);
                }
            }, [isAuth, filterDate]);

            async function fetchData() {
                setLoading(true);
                const { data, error } = await _supabase
                    .from("agendamentos")
                    .select("*")
                    .eq("data_atendimento", filterDate)
                    .order("horario", { ascending: true });
                
                if (!error) setClientes(data || []);
                setLoading(false);
                setTimeout(() => lucide.createIcons(), 100);
            }

            async function updateStatus(id, campo, valor) {
                const { error } = await _supabase.from("agendamentos").update({ [campo]: valor }).eq("id", id);
                if (!error) fetchData();
            }

            if (!isAuth) return <LoginPortal onLogin={() => setIsAuth(true)} />;

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Luxo */}
                    <header className="bg-white border-b border-gray-100 p-6 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-black italic uppercase tracking-tighter">
                                    Portal <span className="text-[#f09f0a]">Rivi Silva</span>
                                </h1>
                                <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Controle de Fluxo e Agendamentos</p>
                            </div>
                            <div className="flex items-center gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                                <i data-lucide="calendar" className="text-[#f09f0a] w-4 h-4 ml-2"></i>
                                <input 
                                    type="date" 
                                    className="bg-transparent border-none text-xs font-black outline-none uppercase"
                                    value={filterDate}
                                    onChange={(e) => setFilterDate(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-4 md:p-8 space-y-6">
                        {/* Cards de Métricas */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 flex items-center justify-between group hover:border-[#f09f0a] transition-all">
                                <div>
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Agendamentos</p>
                                    <p className="text-4xl font-black italic">{clientes.length}</p>
                                </div>
                                <div className="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-[#f09f0a]">
                                    <i data-lucide="users" className="w-7 h-7"></i>
                                </div>
                            </div>
                            <div className="bg-black p-8 rounded-[2.5rem] shadow-xl flex items-center justify-between border-b-4 border-[#f09f0a]">
                                <div>
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Estimativa do Dia</p>
                                    <p className="text-4xl font-black italic text-[#f09f0a]">
                                        R$ {clientes.reduce((acc, c) => acc + Number(c.valor || 0), 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                    </p>
                                </div>
                                <div className="w-14 h-14 bg-[#f09f0a] rounded-2xl flex items-center justify-center text-black">
                                    <i data-lucide="banknote" className="w-7 h-7"></i>
                                </div>
                            </div>
                        </div>

                        {/* Tabela Administrativa */}
                        <div className="bg-white rounded-[3rem] shadow-2xl border border-gray-100 overflow-hidden">
                            <div className="p-8 border-b border-gray-50 bg-gray-50/30 flex justify-between items-center">
                                <h3 className="font-black italic uppercase tracking-tighter text-lg underline decoration-[#f09f0a] decoration-4">Fluxo de Hoje</h3>
                                <button onClick={fetchData} className="p-2 hover:rotate-180 transition-all duration-500">
                                    <i data-lucide="refresh-cw" className="w-5 h-5 text-gray-400"></i>
                                </button>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-gray-50/50">
                                        <tr className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">
                                            <th className="px-8 py-6">Horário</th>
                                            <th className="px-8 py-6">Cliente</th>
                                            <th className="px-8 py-6 text-center">Status Sinal</th>
                                            <th className="px-8 py-6 text-center">Presença</th>
                                            <th className="px-8 py-6 text-right">Valor</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {loading ? (
                                            <tr><td colSpan="5" className="py-20 text-center text-gray-300 font-bold uppercase text-[10px] italic tracking-widest animate-pulse">Carregando dados...</td></tr>
                                        ) : clientes.length === 0 ? (
                                            <tr><td colSpan="5" className="py-20 text-center text-gray-300 font-bold uppercase text-[10px] italic tracking-widest uppercase">Sem atendimentos para esta data</td></tr>
                                        ) : (
                                            clientes.map(c => (
                                                <tr key={c.id} className="hover:bg-orange-50/30 transition-all group">
                                                    <td className="px-8 py-6">
                                                        <span className="bg-black text-[#f09f0a] px-4 py-2 rounded-xl font-black text-xs shadow-lg">{c.horario}</span>
                                                    </td>
                                                    <td className="px-8 py-6">
                                                        <p className="font-black italic uppercase text-sm group-hover:text-[#f09f0a] transition-colors">{c.cliente_nome}</p>
                                                        <p className="text-[10px] text-gray-400 font-bold">{c.telefone || 'SEM CONTATO'}</p>
                                                    </td>
                                                    <td className="px-8 py-6 text-center">
                                                        <button 
                                                            onClick={() => updateStatus(c.id, 'status', c.status === 'Sinal Pago' ? 'Pendente' : 'Sinal Pago')}
                                                            className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all shadow-sm border ${c.status === 'Sinal Pago' ? 'bg-green-50 border-green-200 text-green-600' : 'bg-white border-gray-200 text-gray-400'}`}
                                                        >
                                                            {c.status === 'Sinal Pago' ? 'Sinal Pago' : 'Pendente'}
                                                        </button>
                                                    </td>
                                                    <td className="px-8 py-6">
                                                        <div className="flex justify-center gap-2">
                                                            <button onClick={() => updateStatus(c.id, 'presenca', 'Atendeu')} title="Confirmar Presença" className={`p-2.5 rounded-xl transition-all ${c.presenca === 'Atendeu' ? 'bg-green-500 text-white shadow-lg shadow-green-200' : 'bg-gray-100 text-gray-300 hover:bg-gray-200'}`}><i data-lucide="user-check" className="w-4 h-4"></i></button>
                                                            <button onClick={() => updateStatus(c.id, 'presenca', 'Faltou')} title="Marcar Falta" className={`p-2.5 rounded-xl transition-all ${c.presenca === 'Faltou' ? 'bg-red-500 text-white shadow-lg shadow-red-200' : 'bg-gray-100 text-gray-300 hover:bg-gray-200'}`}><i data-lucide="user-x" className="w-4 h-4"></i></button>
                                                        </div>
                                                    </td>
                                                    <td className="px-8 py-6 text-right font-black italic text-[#f09f0a] text-lg">
                                                        R$ {Number(c.valor || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
