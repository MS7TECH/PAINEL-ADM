<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin | Rivi Silva</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f4f5; }
        .gold-bg { background: linear-gradient(135deg, #f09f0a 0%, #a67c00 100%); }
        .gold-text { color: #f09f0a; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f09f0a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://rahubkowehwtvditbhlx.supabase.co';
        const supabaseKey = 'sb_publishable_wKbs4gYVURdIR6Cafm8qFA_tUZZTIKo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const LoginPortal = ({ onLogin }) => {
            const [pass, setPass] = useState("");
            const handleLogin = () => pass === "1234" ? onLogin() : alert("Senha Incorreta");
            return (
                <div className="min-h-screen flex items-center justify-center bg-black p-4">
                    <div className="bg-[#111] p-10 rounded-[2.5rem] border border-[#f09f0a]/20 w-full max-w-md text-center shadow-2xl">
                        <div className="mb-6 flex justify-center">
                            <div className="w-20 h-20 rounded-full bg-[#f09f0a] flex items-center justify-center shadow-[0_0_30px_rgba(240,159,10,0.3)]">
                                <i data-lucide="shield-check" className="text-black w-10 h-10"></i>
                            </div>
                        </div>
                        <h2 className="text-[#f09f0a] font-black italic uppercase text-3xl mb-2 tracking-tighter">Rivi Silva</h2>
                        <input type="password" placeholder="SENHA" className="w-full p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-white text-center mb-6 outline-none focus:border-[#f09f0a]" value={pass} onChange={(e) => setPass(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleLogin()} />
                        <button onClick={handleLogin} className="w-full py-5 gold-bg text-black font-black uppercase text-xs tracking-widest rounded-2xl"> Entrar </button>
                    </div>
                </div>
            );
        };

        function Dashboard() {
            const [isAuth, setIsAuth] = useState(false);
            const [loading, setLoading] = useState(true);
            const [clientes, setClientes] = useState([]);
            const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [servicosDb, setServicosDb] = useState([]);
            const [servicosSelecionados, setServicosSelecionados] = useState([]);
            const [novoAgendamento, setNovoAgendamento] = useState({ nome: "", telefone: "", data: new Date().toISOString().split('T')[0], horario: "08:00" });

            useEffect(() => {
                if (isAuth) {
                    fetchData();
                    fetchServicos();
                }
            }, [isAuth, filterDate]);

            // Garante que os ícones do Lucide carreguem quando o modal abrir
            useEffect(() => {
                if (isModalOpen) setTimeout(() => lucide.createIcons(), 100);
            }, [isModalOpen]);

            async function fetchServicos() {
                const { data } = await _supabase.from("servicos").select("*").order("nome");
                if (data) setServicosDb(data);
            }

            async function fetchData() {
                setLoading(true);
                const { data, error } = await _supabase.from("agendamentos").select("*").eq("data_atendimento", filterDate).order("horario", { ascending: true });
                if (!error) setClientes(data || []);
                setLoading(false);
                setTimeout(() => lucide.createIcons(), 100);
            }

            async function updateStatus(id, campo, valor) {
                const { error } = await _supabase.from("agendamentos").update({ [campo]: valor }).eq("id", id);
                if (!error) fetchData();
            }

            const toggleServico = (servico) => {
                const isSelected = servicosSelecionados.some(s => s.nome === servico.nome);
                if (isSelected) setServicosSelecionados(servicosSelecionados.filter(s => s.nome !== servico.nome));
                else setServicosSelecionados([...servicosSelecionados, servico]);
            };

            const totalValorNovo = servicosSelecionados.reduce((acc, s) => acc + (Number(s.preco) || 0), 0);

            const handleAddAgendamento = async () => {
                if (!novoAgendamento.nome || servicosSelecionados.length === 0) return alert("Preencha o nome e selecione um serviço!");
                const payload = { cliente_nome: novoAgendamento.nome.toUpperCase(), telefone: novoAgendamento.telefone, data_atendimento: novoAgendamento.data, horario: novoAgendamento.horario, servico: servicosSelecionados.map(s => s.nome).join(", "), valor: totalValorNovo, status: "Aguardando", presenca: "Pendente" };
                const { error } = await _supabase.from("agendamentos").insert([payload]);
                if (!error) { setIsModalOpen(false); setServicosSelecionados([]); setNovoAgendamento({ ...novoAgendamento, nome: "", telefone: "" }); fetchData(); }
            };

            if (!isAuth) return <LoginPortal onLogin={() => setIsAuth(true)} />;

            const stats = {
                total: clientes.length,
                confirmados: clientes.filter(c => c.presenca === 'Atendeu').length,
                financeiro: clientes.reduce((acc, c) => acc + Number(c.valor || 0), 0)
            };

            return (
                <div className="min-h-screen flex flex-col pb-20 relative">
                    <header className="bg-white border-b border-gray-100 p-6 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <h1 className="text-2xl font-black italic uppercase tracking-tighter">PORTAL <span className="text-[#f09f0a]">ADMIN</span></h1>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-2 px-6 py-3 gold-bg text-black rounded-2xl font-black text-[10px] uppercase shadow-lg hover:scale-105 transition-all">
                                    <i data-lucide="plus" className="w-4 h-4"></i> Novo Agendamento
                                </button>
                                <input type="date" className="bg-gray-100 p-3 rounded-2xl text-xs font-black outline-none uppercase" value={filterDate} onChange={(e) => setFilterDate(e.target.value)} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-8 space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                <p className="text-[9px] font-black text-gray-400 uppercase">Agendados</p>
                                <p className="text-3xl font-black italic">{stats.total}</p>
                            </div>
                            <div className="bg-black p-6 rounded-[2rem] shadow-xl text-white">
                                <p className="text-[9px] font-black text-[#f09f0a] uppercase">Receita Prevista</p>
                                <p className="text-2xl font-black italic">R$ {stats.financeiro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-gray-50/50 text-[10px] font-black text-gray-400 uppercase">
                                    <tr>
                                        <th className="px-8 py-6">Horário</th>
                                        <th className="px-8 py-6">Cliente</th>
                                        <th className="px-8 py-6 text-center">Status</th>
                                        <th className="px-8 py-6 text-right">Valor</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-50">
                                    {clientes.map(c => (
                                        <tr key={c.id} className="hover:bg-gray-50/80 transition-all">
                                            <td className="px-8 py-6"><span className="bg-black text-[#f09f0a] px-4 py-2 rounded-xl font-black text-xs">{c.horario}</span></td>
                                            <td className="px-8 py-6 font-black italic uppercase text-sm">{c.cliente_nome}</td>
                                            <td className="px-8 py-6 text-center">
                                                <button onClick={() => updateStatus(c.id, 'status', c.status === 'Sinal Pago' ? 'Pendente' : 'Sinal Pago')} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase ${c.status === 'Sinal Pago' ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-400'}`}>{c.status === 'Sinal Pago' ? 'Pago' : 'Pendente'}</button>
                                            </td>
                                            <td className="px-8 py-6 text-right font-black italic text-[#f09f0a]">R$ {Number(c.valor || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>

                    {/* MODAL COM BOTÃO DE VOLTAR/FECHAR */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl border-2 border-[#f09f0a] relative animate-in zoom-in duration-300">
                                
                                {/* BOTÃO FECHAR (X) */}
                                <button 
                                    onClick={() => setIsModalOpen(false)} 
                                    className="absolute top-6 right-6 p-2 bg-gray-100 rounded-full text-gray-400 hover:text-black hover:bg-gray-200 transition-all z-50"
                                >
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>

                                <div className="p-8 space-y-6">
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter text-black">Novo <span className="text-[#f09f0a]">Cadastro</span></h2>

                                    <div className="space-y-4">
                                        <input type="text" className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none text-[10px] font-black focus:border-[#f09f0a]" placeholder="NOME DO CLIENTE" value={novoAgendamento.nome} onChange={(e) => setNovoAgendamento({...novoAgendamento, nome: e.target.value.toUpperCase()})} />
                                        <input type="tel" className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none text-[10px] font-black focus:border-[#f09f0a]" placeholder="WHATSAPP" value={novoAgendamento.telefone} onChange={(e) => setNovoAgendamento({...novoAgendamento, telefone: e.target.value})} />
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="date" className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-[10px] font-black" value={novoAgendamento.data} onChange={(e) => setNovoAgendamento({...novoAgendamento, data: e.target.value})} />
                                            <input type="time" className="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-[10px] font-black" value={novoAgendamento.horario} onChange={(e) => setNovoAgendamento({...novoAgendamento, horario: e.target.value})} />
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-2">Procedimentos</label>
                                            <div className="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto custom-scroll pr-1">
                                                {servicosDb.map(s => (
                                                    <button key={s.nome} onClick={() => toggleServico(s)} className={`p-4 rounded-xl text-[9px] font-black uppercase text-left border ${servicosSelecionados.some(sel => sel.nome === s.nome) ? 'bg-orange-50 border-[#f09f0a] text-[#f09f0a]' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>{s.nome}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="p-4 rounded-2xl flex justify-between items-center bg-black text-white">
                                            <span className="text-[9px] font-black uppercase text-[#f09f0a]">Total:</span>
                                            <span className="font-black italic text-xl">R$ {totalValorNovo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                        </div>

                                        <button onClick={handleAddAgendamento} className="w-full py-5 gold-bg text-black font-black uppercase text-[11px] tracking-[0.2em] rounded-2xl shadow-xl">Confirmar</button>
                                        
                                        {/* BOTÃO SECUNDÁRIO PARA VOLTAR */}
                                        <button onClick={() => setIsModalOpen(false)} className="w-full py-3 text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-black transition-colors">Voltar para Agenda</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <footer className="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 p-4 text-center z-10">
                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-[0.4em]">© 2026 Rivi Silva Style</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
